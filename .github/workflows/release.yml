name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Get version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          COMMIT=$(git rev-parse HEAD)
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Build all platforms
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT="${{ steps.version.outputs.commit }}"
          DATE="${{ steps.version.outputs.date }}"
          LDFLAGS="-s -w -X github.com/aiwen/aw-cli/internal/build.Version=$VERSION -X github.com/aiwen/aw-cli/internal/build.Commit=$COMMIT -X github.com/aiwen/aw-cli/internal/build.Date=$DATE"

          mkdir -p dist

          # Linux
          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/aw-cli_${VERSION}_linux_amd64 .
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/aw-cli_${VERSION}_linux_arm64 .

          # Windows
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/aw-cli_${VERSION}_windows_amd64.exe .
          GOOS=windows GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/aw-cli_${VERSION}_windows_arm64.exe .

          # macOS
          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/aw-cli_${VERSION}_darwin_amd64 .
          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/aw-cli_${VERSION}_darwin_arm64 .

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum *.exe *./* 2>/dev/null || true
          sha256sum aw-cli_${VERSION}_* > checksums-sha256.txt
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: aw-cli v${{ steps.version.outputs.version }}
          body: |
            ## aw-cli v${{ steps.version.outputs.version }}

            ### Downloads

            | Platform | Arch | File |
            |----------|------|------|
            | Linux | amd64 | `aw-cli_${{ steps.version.outputs.version }}_linux_amd64` |
            | Linux | arm64 | `aw-cli_${{ steps.version.outputs.version }}_linux_arm64` |
            | Windows | amd64 | `aw-cli_${{ steps.version.outputs.version }}_windows_amd64.exe` |
            | Windows | arm64 | `aw-cli_${{ steps.version.outputs.version }}_windows_arm64.exe` |
            | macOS | amd64 | `aw-cli_${{ steps.version.outputs.version }}_darwin_amd64` |
            | macOS | arm64 | `aw-cli_${{ steps.version.outputs.version }}_darwin_arm64` |

            ### Install (Linux/macOS)
            ```bash
            curl -sL https://github.com/aiwen/aw-cli/releases/download/v${{ steps.version.outputs.version }}/aw-cli_${{ steps.version.outputs.version }}_linux_amd64 -o /usr/local/bin/aw-cli
            chmod +x /usr/local/bin/aw-cli
            ```

            ### Install (Windows PowerShell)
            ```powershell
            Invoke-WebRequest -Uri "https://github.com/aiwen/aw-cli/releases/download/v${{ steps.version.outputs.version }}/aw-cli_${{ steps.version.outputs.version }}_windows_amd64.exe" -OutFile "aw-cli.exe"
            ```

          files: |
            dist/aw-cli_${{ steps.version.outputs.version }}_*
            dist/checksums-sha256.txt
          draft: false
          prerelease: false
