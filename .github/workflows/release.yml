name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  goreleaser:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Get version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          COMMIT=$(git rev-parse --short HEAD)
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Build all platforms
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT="${{ steps.version.outputs.commit }}"
          DATE="${{ steps.version.outputs.date }}"
          LDFLAGS="-s -w -X github.com/aiwen/aw-cli/internal/build.Version=$VERSION -X github.com/aiwen/aw-cli/internal/build.Commit=$COMMIT -X github.com/aiwen/aw-cli/internal/build.Date=$DATE"

          mkdir -p dist

          # Linux
          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/aw-cli .
          mv dist/aw-cli dist/aw-cli_${VERSION}_linux_amd64

          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/aw-cli .
          mv dist/aw-cli dist/aw-cli_${VERSION}_linux_arm64

          # macOS
          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/aw-cli .
          mv dist/aw-cli dist/aw-cli_${VERSION}_darwin_amd64

          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/aw-cli .
          mv dist/aw-cli dist/aw-cli_${VERSION}_darwin_arm64

          # Windows
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/aw-cli.exe .
          mv dist/aw-cli.exe dist/aw-cli_${VERSION}_windows_amd64.exe

          GOOS=windows GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/aw-cli.exe .
          mv dist/aw-cli.exe dist/aw-cli_${VERSION}_windows_arm64.exe

      - name: Package archives
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd dist

          # Linux / macOS → tar.gz archives
          for f in aw-cli_${VERSION}_linux_* aw-cli_${VERSION}_darwin_*; do
            if [ -f "$f" ]; then
              # Extract os and arch from filename: aw-cli_VERSION_OS_ARCH
              base="${f#aw-cli_${VERSION}_}"
              os="${base%_*}"
              arch="${base##*_}"
              archive="aw-cli-${VERSION}-${os}-${arch}.tar.gz"
              tmpdir="$(mktemp -d)"
              cp "$f" "$tmpdir/aw-cli"
              tar -C "$tmpdir" -czf "$archive" aw-cli
              rm -rf "$tmpdir"
            fi
          done

          # Windows → zip archives
          for f in aw-cli_${VERSION}_windows_*.exe; do
            if [ -f "$f" ]; then
              base="${f#aw-cli_${VERSION}_}"
              base="${base%.exe}"
              os="${base%_*}"
              arch="${base##*_}"
              archive="aw-cli-${VERSION}-${os}-${arch}.zip"
              archive_path="$PWD/$archive"
              tmpdir="$(mktemp -d)"
              cp "$f" "$tmpdir/aw-cli.exe"
              (cd "$tmpdir" && zip "$archive_path" aw-cli.exe)
              rm -rf "$tmpdir"
            fi
          done

      - name: Generate checksums
        working-directory: dist
        run: |
          # Generate checksums.txt for npm install script:
          # Format: sha256  archive-name  (two spaces between hash and name)
          for archive in aw-cli-*.tar.gz aw-cli-*.zip; do
            if [ -f "$archive" ]; then
              sha256sum "$archive" | sed 's/  /  /' >> checksums.txt
            fi
          done

          # Also generate checksums for raw binaries
          sha256sum aw-cli_* > checksums-binaries.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: aw-cli v${{ steps.version.outputs.version }}
          body: |
            ## aw-cli v${{ steps.version.outputs.version }}

            ### Fast Install
            ```bash
            npx @aiwen/aw-cli@latest install
            ```
            or
            ```bash
            npm install -g @aiwen/aw-cli
            ```

            ### Manual Downloads

            | Platform | Arch | Archive |
            |----------|------|---------|
            | Linux | amd64 | `aw-cli-${{ steps.version.outputs.version }}-linux-amd64.tar.gz` |
            | Linux | arm64 | `aw-cli-${{ steps.version.outputs.version }}-linux-arm64.tar.gz` |
            | macOS | amd64 | `aw-cli-${{ steps.version.outputs.version }}-darwin-amd64.tar.gz` |
            | macOS | arm64 | `aw-cli-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz` |
            | Windows | amd64 | `aw-cli-${{ steps.version.outputs.version }}-windows-amd64.zip` |
            | Windows | arm64 | `aw-cli-${{ steps.version.outputs.version }}-windows-arm64.zip` |

          files: |
            dist/aw-cli-${{ steps.version.outputs.version }}-*
            dist/aw-cli_${{ steps.version.outputs.version }}_*
            dist/checksums.txt
            dist/checksums-binaries.txt
          draft: false
          prerelease: false

  publish-npm:
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download checksums from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          gh release download "${TAG}" --pattern checksums.txt --dir .
          test -s checksums.txt || { echo "checksums.txt missing or empty for ${TAG}"; exit 1; }

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
